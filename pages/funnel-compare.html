<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Funnel - Customer Journey</title>
  <script src="https://cdn.plot.ly/plotly-3.5.0.min.js" charset="utf-8"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020617; color: #e2e8f0; font-family: Inter, system-ui, -apple-system, sans-serif; }
    .page-wrap { max-width: 1440px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 18px; color: #f8fafc; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #64748b; margin-bottom: 24px; }

    /* ===================== CHEVRON PIPELINE ===================== */
    .pipeline { display: flex; gap: 0; margin-bottom: 0; overflow-x: auto; }
    .pillar {
      flex: 1; min-width: 160px; position: relative;
      padding: 14px 18px 14px 28px;
      clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 50%, calc(100% - 16px) 100%, 0 100%, 16px 50%);
      text-align: center;
    }
    .pillar:first-child { clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 50%, calc(100% - 16px) 100%, 0 100%); padding-left: 18px; }
    .pillar-name { font-size: 13px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; }
    .pillar-count { font-size: 22px; font-weight: 800; color: #fff; margin: 2px 0; }
    .pillar-conv { font-size: 11px; color: rgba(255,255,255,0.75); }

    /* Pillar colors */
    .pillar-acquisition { background: #ef4444; }
    .pillar-registration { background: #f59e0b; }
    .pillar-workshop { background: #22c55e; }
    .pillar-sales { background: #3b82f6; }
    .pillar-revenue { background: #8b5cf6; }
    .pillar-outcome { background: #06b6d4; }

    /* ===================== METRICS STRIP ===================== */
    .metrics-strip {
      display: flex; gap: 0; background: #0f172a; border: 1px solid #1e293b;
      border-radius: 0 0 8px 8px; margin-bottom: 24px; overflow-x: auto;
    }
    .metric-col {
      flex: 1; min-width: 160px; padding: 12px 14px;
      border-right: 1px solid #1e293b;
    }
    .metric-col:last-child { border-right: none; }
    .metric-item { margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .metric-badge {
      font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 3px;
      min-width: 20px; text-align: center; color: #fff; flex-shrink: 0;
    }
    .badge-green { background: #22c55e; }
    .badge-red { background: #ef4444; }
    .badge-yellow { background: #f59e0b; }
    .badge-blue { background: #3b82f6; }
    .badge-purple { background: #8b5cf6; }
    .badge-cyan { background: #06b6d4; }
    .badge-gray { background: #475569; }
    .metric-text { font-size: 11px; color: #94a3b8; }
    .metric-text strong { color: #e2e8f0; font-weight: 600; }

    /* Drop-off callouts */
    .dropoff-row {
      display: flex; gap: 0; margin-bottom: 24px; overflow-x: auto;
    }
    .dropoff-col {
      flex: 1; min-width: 160px; padding: 0 14px; text-align: center;
    }
    .dropoff-arrow {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 12px;
    }
    .dropoff-arrow.loss { background: #ef444420; color: #ef4444; }
    .dropoff-arrow.gain { background: #22c55e20; color: #22c55e; }
    .dropoff-arrow.neutral { background: #64748b20; color: #64748b; }
    .dropoff-detail { font-size: 10px; color: #64748b; margin-top: 3px; }

    /* ===================== SANKEY ===================== */
    .sankey-section {
      background: #0f172a; border-radius: 12px; border: 1px solid #1e293b;
      padding: 20px; margin-bottom: 24px;
    }
    .section-title { font-size: 14px; color: #94a3b8; font-weight: 400; margin-bottom: 12px; }
    #sankey-chart { width: 100%; height: 520px; }

    /* ===================== SEGMENT TABLE ===================== */
    .segment-section {
      background: #0f172a; border-radius: 12px; border: 1px solid #1e293b;
      padding: 20px; margin-bottom: 24px; overflow-x: auto;
    }
    .seg-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .seg-table th {
      text-align: center; padding: 10px 12px; color: #020617; font-weight: 700;
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .seg-table th:first-child { text-align: left; background: #1e293b; color: #94a3b8; }
    .seg-table td { text-align: center; padding: 10px 12px; border-top: 1px solid #1e293b; }
    .seg-table td:first-child { text-align: left; color: #e2e8f0; font-weight: 600; }
    .seg-table tbody tr:hover { background: #1e293b40; }
    .cell-pct { font-size: 14px; font-weight: 700; display: block; }
    .cell-abs { font-size: 11px; color: #64748b; display: block; }
    .pct-green { color: #22c55e; }
    .pct-yellow { color: #f59e0b; }
    .pct-red { color: #ef4444; }
    .pct-blue { color: #38bdf8; }
    .pct-purple { color: #a78bfa; }
    .pct-cyan { color: #06b6d4; }

    /* Column header colors matching pillars */
    .th-acquisition { background: #ef4444; }
    .th-registration { background: #f59e0b; }
    .th-workshop { background: #22c55e; }
    .th-sales { background: #3b82f6; }
    .th-revenue { background: #8b5cf6; }
    .th-outcome { background: #06b6d4; }

    /* ===================== CLOSER MINI-TABLE ===================== */
    .closer-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px; margin-top: 16px;
    }
    .closer-card {
      background: #1e293b; border-radius: 8px; padding: 14px; border: 1px solid #334155;
    }
    .closer-card .cc-name { font-size: 13px; font-weight: 600; color: #f8fafc; margin-bottom: 8px; }
    .closer-card .cc-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
    .closer-card .cc-label { color: #64748b; }
    .closer-card .cc-val { color: #e2e8f0; font-weight: 600; }
    .closer-card .cc-rate { font-size: 18px; font-weight: 700; }
  </style>
</head>

    <!-- 4. INTERACTIVE SANKEY -->
    <div class="sankey-section">

    { name: 'Lawyers & Legal', tickets: 52, attended: 31, booked: 28, showed: 22, enrolled: 5, cash: 48500 },
    { name: 'Coaches & Consultants', tickets: 89, attended: 54, booked: 42, showed: 32, enrolled: 4, cash: 31200 },
    { name: 'Healthcare', tickets: 41, attended: 24, booked: 19, showed: 15, enrolled: 2, cash: 16400 },
    { name: 'Education & Training', tickets: 38, attended: 23, booked: 18, showed: 14, enrolled: 2, cash: 14000 },
    { name: 'Other', tickets: 69, attended: 41, booked: 33, showed: 24, enrolled: 2, cash: 14000 }
  ]
};

function fmt(n) { return n >= 1000 ? '$' + (n/1000).toFixed(1) + 'K' : '$' + n; }
function fmtN(n) { return n.toLocaleString(); }
function pct(n) { return (n * 100).toFixed(1) + '%'; }
function deltaPct(cur, prev) {
  if (!prev) return { val: 0, text: '--', cls: 'neutral' };
  var d = ((cur - prev) / prev * 100);
  var prefix = d > 0 ? '+' : '';
  return { val: d, text: prefix + d.toFixed(1) + '%', cls: d > 0 ? 'gain' : (d < 0 ? 'loss' : 'neutral') };
}

// ========================================
// 1. CHEVRON PIPELINE
// ========================================
(function() {
  var pillars = [
    { cls: 'pillar-acquisition', name: 'Acquisition', count: fmt(D.adSpend), conv: fmtN(D.tickets) + ' tickets purchased' },
    { cls: 'pillar-registration', name: 'Registration', count: fmtN(D.tickets), conv: pct(D.vipPct) + ' VIP upgrade' },
    { cls: 'pillar-workshop', name: 'Workshop', count: fmtN(D.attended), conv: pct(D.showRate) + ' show rate' },
    { cls: 'pillar-sales', name: 'Sales', count: fmtN(D.showed) + ' calls', conv: pct(D.callShowRate) + ' call show' },
    { cls: 'pillar-revenue', name: 'Enrollment', count: fmtN(D.enrolled), conv: pct(D.closeRate) + ' close rate' },
    { cls: 'pillar-outcome', name: 'Revenue', count: fmt(D.cash), conv: fmt(D.contract) + ' contract' }
  ];

  var html = '';
  pillars.forEach(function(p) {
    html += '<div class="pillar ' + p.cls + '">';
    html += '<div class="pillar-name">' + p.name + '</div>';
    html += '<div class="pillar-count">' + p.count + '</div>';
    html += '<div class="pillar-conv">' + p.conv + '</div>';
    html += '</div>';
  });
  document.getElementById('pipeline').innerHTML = html;
})();

      { badge: 'badge-red', text: '5 Shifts: <strong>' + fmt(D.shiftsAds) + '</strong>' },
      { badge: 'badge-gray', text: 'Cost/Ticket: <strong>' + fmt(D.cpt) + '</strong>' },
      { badge: 'badge-gray', text: 'vs Prior: <strong>' + deltaPct(D.adSpend, D.prior.spend).text + '</strong>' }
    ],
    // Registration
    [
      { badge: 'badge-yellow', text: 'Free Tickets: <strong>' + fmtN(D.free) + '</strong>' },
      { badge: 'badge-yellow', text: 'Paid $27: <strong>' + fmtN(D.paid) + '</strong>' },
      { badge: 'badge-yellow', text: 'VIP $54: <strong>' + fmtN(D.vip) + ' (' + pct(D.vipPct) + ')</strong>' },
      { badge: 'badge-gray', text: 'Ticket Rev: <strong>' + fmt(D.ticketRev) + '</strong>' },
      { badge: 'badge-gray', text: 'vs Prior: <strong>' + deltaPct(D.tickets, D.prior.tickets).text + '</strong>' }
    ],
    // Workshop
    [
      { badge: 'badge-green', text: 'VIP Attended: <strong>' + fmtN(D.vipAtt) + ' (' + pct(D.vipShowRate) + ')</strong>' },
      { badge: 'badge-green', text: 'Standard: <strong>' + fmtN(D.stdAtt) + ' (' + pct(D.stdShowRate) + ')</strong>' },
      { badge: 'badge-red', text: 'No-Show: <strong>' + fmtN(D.noShowWk) + ' (' + pct(1 - D.showRate) + ')</strong>' },
      { badge: 'badge-gray', text: 'vs Prior: <strong>' + deltaPct(D.attended, D.prior.attended).text + '</strong>' }
    ],
    // Sales
    [
      { badge: 'badge-blue', text: 'Booked (Workshop): <strong>' + fmtN(D.wkBooked) + '</strong>' },
      { badge: 'badge-blue', text: 'Booked (Other): <strong>' + fmtN(D.otherBooked) + '</strong>' },
      { badge: 'badge-red', text: 'No-Show: <strong>' + fmtN(D.noShowCall) + '</strong> | Cancel: <strong>' + fmtN(D.cancelled) + '</strong>' },
      { badge: 'badge-red', text: 'Did Not Book: <strong>' + fmtN(D.didNotBook) + '</strong>' },
      { badge: 'badge-gray', text: 'CPB: <strong>' + fmt(D.cpb) + '</strong>' }
    ],
    // Enrollment
    [
      { badge: 'badge-purple', text: 'Enrolled: <strong>' + fmtN(D.enrolled) + '</strong>' },
      { badge: 'badge-red', text: 'No Sale: <strong>' + fmtN(D.noSale) + '</strong>' },
      { badge: 'badge-yellow', text: 'Follow Up: <strong>' + fmtN(D.followUp) + '</strong>' },
      { badge: 'badge-gray', text: 'No Offer: <strong>' + fmtN(D.noOffer) + '</strong>' },
      { badge: 'badge-gray', text: 'CPA: <strong>' + fmt(D.cpa) + '</strong>' }
    ],
    // Revenue
    [
      { badge: 'badge-cyan', text: 'Cash: <strong>' + fmt(D.cash) + '</strong>' },
      { badge: 'badge-cyan', text: 'Contract: <strong>' + fmt(D.contract) + '</strong>' },
      { badge: 'badge-cyan', text: 'ROAS (cash): <strong>' + D.roasCash.toFixed(2) + 'x</strong>' },
      { badge: 'badge-cyan', text: 'ROAS (contract): <strong>' + D.roasContract.toFixed(2) + 'x</strong>' },
      { badge: 'badge-gray', text: 'vs Prior: <strong>' + deltaPct(D.cash, D.prior.cash).text + '</strong>' }
    ]
  ];

  var html = '';
  cols.forEach(function(metrics) {
    html += '<div class="metric-col">';
    metrics.forEach(function(m) {
      html += '<div class="metric-item">';
      html += '<span class="metric-badge ' + m.badge + '">&bull;</span>';
      html += '<span class="metric-text">' + m.text + '</span>';
      html += '</div>';
    });
    html += '</div>';
  });
  document.getElementById('metrics-strip').innerHTML = html;
})();

// ========================================
// 3. DROP-OFF ROW
// ========================================
(function() {
  var drops = [
    { label: '', detail: '' }, // Acquisition (no drop-off from previous)
    { delta: deltaPct(D.tickets, D.prior.tickets), lost: '', detail: '' },
    { lost: fmtN(D.noShowWk) + ' no-show', delta: deltaPct(D.attended, D.prior.attended), detail: pct(1 - D.showRate) + ' drop-off' },
    { lost: fmtN(D.didNotBook) + ' didn\'t book', delta: deltaPct(D.booked, D.prior.booked), detail: fmtN(D.noShowCall) + ' no-show + ' + fmtN(D.cancelled) + ' cancel' },
    { lost: fmtN(D.showed - D.enrolled) + ' not enrolled', delta: deltaPct(D.enrolled, D.prior.enrolled), detail: fmtN(D.noSale) + ' no sale, ' + fmtN(D.followUp) + ' follow-up' },
    { delta: deltaPct(D.cash, D.prior.cash), lost: '', detail: 'DPL: $' + Math.round(D.cash / D.enrolled).toLocaleString() }
  ];

  var html = '';
  drops.forEach(function(d) {
    html += '<div class="dropoff-col">';
    if (d.delta) {
      html += '<div class="dropoff-arrow ' + d.delta.cls + '">';
      html += (d.delta.cls === 'loss' ? '\u2193 ' : (d.delta.cls === 'gain' ? '\u2191 ' : '')) + d.delta.text + ' vs prior';
      html += '</div>';
    }
    if (d.lost) html += '<div class="dropoff-detail" style="color:#ef4444;">\u2717 ' + d.lost + '</div>';
    if (d.detail) html += '<div class="dropoff-detail">' + d.detail + '</div>';
    html += '</div>';
  });
  document.getElementById('dropoff-row').innerHTML = html;
})();

    arrangement: 'fixed',
    node: {
      pad: 22, thickness: 24,
      line: { color: '#0f172a', width: 2 },
      label: nodes,
      color: nodeColors,
      x: xPos, y: yPos,
      hovertemplate: '<b>%{label}</b><extra></extra>'
    },
    link: {
      source: src, target: tgt, value: val,
      color: linkColors,
      customdata: lbl,
      hovertemplate: '%{customdata}<extra></extra>'
    }
  }], {
    paper_bgcolor: '#0f172a',
    plot_bgcolor: '#0f172a',
    font: { color: '#cbd5e1', family: 'Inter, system-ui, sans-serif', size: 10 },
    margin: { l: 8, r: 8, t: 8, b: 8 },
    height: 520
  }, { displayModeBar: false, responsive: true });
})();

// ========================================
// 5. SEGMENT TABLE (like the reference image)
// ========================================
(function() {
  var table = document.getElementById('seg-table');
  var colHeaders = [
    { label: 'Tickets', cls: 'th-registration' },
    { label: 'Attended', cls: 'th-workshop' },
    { label: 'Show Rate', cls: 'th-workshop' },
    { label: 'Booked', cls: 'th-sales' },
    { label: 'Book Rate', cls: 'th-sales' },
    { label: 'Showed', cls: 'th-sales' },
    { label: 'Enrolled', cls: 'th-revenue' },
    { label: 'Close Rate', cls: 'th-revenue' },
    { label: 'Cash', cls: 'th-outcome' }
  ];

  var thead = '<thead><tr><th>Segment</th>';
  colHeaders.forEach(function(h) { thead += '<th class="' + h.cls + '">' + h.label + '</th>'; });
  thead += '</tr></thead>';

  var total = D.segments.reduce(function(acc, s) {
    return { tickets: acc.tickets + s.tickets, attended: acc.attended + s.attended, booked: acc.booked + s.booked, showed: acc.showed + s.showed, enrolled: acc.enrolled + s.enrolled, cash: acc.cash + s.cash };
  }, { tickets: 0, attended: 0, booked: 0, showed: 0, enrolled: 0, cash: 0 });

  var tbody = '<tbody>';
  D.segments.forEach(function(s) {
    var showRate = s.tickets ? s.attended / s.tickets : 0;
    var bookRate = s.attended ? s.booked / s.attended : 0;
    var closeRate = s.showed ? s.enrolled / s.showed : 0;
    var ticketPct = total.tickets ? s.tickets / total.tickets : 0;

    tbody += '<tr>';
    tbody += '<td>' + s.name + '</td>';
    tbody += '<td><span class="cell-pct pct-yellow">' + pct(ticketPct) + '</span><span class="cell-abs">' + fmtN(s.tickets) + '</span></td>';
    tbody += '<td><span class="cell-pct pct-green">' + pct(s.attended / total.attended) + '</span><span class="cell-abs">' + fmtN(s.attended) + '</span></td>';
    tbody += '<td><span class="cell-pct ' + (showRate >= 0.60 ? 'pct-green' : 'pct-red') + '">' + pct(showRate) + '</span></td>';
    tbody += '<td><span class="cell-pct pct-blue">' + pct(s.booked / total.booked) + '</span><span class="cell-abs">' + fmtN(s.booked) + '</span></td>';
    tbody += '<td><span class="cell-pct ' + (bookRate >= 0.40 ? 'pct-green' : 'pct-yellow') + '">' + pct(bookRate) + '</span></td>';
    tbody += '<td><span class="cell-pct pct-blue">' + fmtN(s.showed) + '</span></td>';
    tbody += '<td><span class="cell-pct pct-purple">' + fmtN(s.enrolled) + '</span></td>';
    tbody += '<td><span class="cell-pct ' + (closeRate >= 0.20 ? 'pct-green' : 'pct-red') + '">' + pct(closeRate) + '</span></td>';
    tbody += '<td><span class="cell-pct pct-cyan">' + fmt(s.cash) + '</span></td>';
    tbody += '</tr>';
  });
  tbody += '</tbody>';

  table.innerHTML = thead + tbody;

  // Closer cards
  var grid = document.getElementById('closer-grid');
  var closerHtml = '';
  D.closers.forEach(function(c) {
    var rateColor = c.rate >= 0.25 ? '#22c55e' : (c.rate >= 0.20 ? '#f59e0b' : '#ef4444');
    closerHtml += '<div class="closer-card">';
    closerHtml += '<div class="cc-name">' + c.name + '</div>';
    closerHtml += '<div class="cc-row"><span class="cc-label">Close Rate</span><span class="cc-rate" style="color:' + rateColor + '">' + pct(c.rate) + '</span></div>';
    closerHtml += '<div class="cc-row"><span class="cc-label">Calls Taken</span><span class="cc-val">' + c.calls + '</span></div>';
    closerHtml += '<div class="cc-row"><span class="cc-label">Enrolled</span><span class="cc-val">' + c.enrolled + '</span></div>';
    closerHtml += '<div class="cc-row"><span class="cc-label">Cash Collected</span><span class="cc-val">' + fmt(c.cash) + '</span></div>';
    closerHtml += '<div class="cc-row"><span class="cc-label">No Sale</span><span class="cc-val" style="color:#ef4444">' + c.noSale + '</span></div>';
    closerHtml += '<div class="cc-row"><span class="cc-label">Follow Up</span><span class="cc-val" style="color:#f59e0b">' + c.followUp + '</span></div>';
    closerHtml += '</div>';
  });
  grid.innerHTML = closerHtml;
})();
</script>
</body>
</html>
