<div class="notes-drawer" id="notes-drawer">
  <div class="notes-toggle" id="notes-toggle">
    <span>Analyst Notes (<span id="notes-count">0</span>)</span>
    <span class="notes-toggle-icon">^</span>
  </div>
  <div class="notes-body">
    <!-- Add note form -->
    <div class="notes-add-form" id="notes-add-form">
      <textarea id="note-text" placeholder="Add an insight, hypothesis, or action item..." rows="3"
        style="width:100%; background:var(--bg-primary); color:var(--text-primary); border:1px solid var(--border); border-radius:6px; padding:8px; font-family:var(--font-family); font-size:13px; resize:vertical;"></textarea>
      <div class="notes-tag-row" style="margin:8px 0; display:flex; gap:6px; flex-wrap:wrap;">
        <label class="note-tag-checkbox tag-insight" style="cursor:pointer;"><input type="checkbox" value="insight"> insight</label>
        <label class="note-tag-checkbox tag-action-item" style="cursor:pointer;"><input type="checkbox" value="action-item"> action-item</label>
        <label class="note-tag-checkbox tag-anomaly" style="cursor:pointer;"><input type="checkbox" value="anomaly"> anomaly</label>
        <label class="note-tag-checkbox tag-hypothesis" style="cursor:pointer;"><input type="checkbox" value="hypothesis"> hypothesis</label>
        <label class="note-tag-checkbox tag-decision" style="cursor:pointer;"><input type="checkbox" value="decision"> decision</label>
        <label class="note-tag-checkbox tag-follow-up" style="cursor:pointer;"><input type="checkbox" value="follow-up"> follow-up</label>
      </div>
      <div style="display:flex; gap:8px;">
        <button id="note-save-btn" class="btn-preset" style="background:var(--accent-primary); color:var(--bg-primary); border-color:var(--accent-primary);">Save Note</button>
        <button id="note-export-btn" class="btn-preset">Export JSON</button>
      </div>
    </div>
    <!-- Sort and filter controls -->
    <div class="notes-controls" style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); margin-bottom:8px;">
      <input type="text" id="notes-search" placeholder="Search notes..." style="background:var(--bg-primary); color:var(--text-primary); border:1px solid var(--border); border-radius:4px; padding:4px 8px; font-size:12px; width:200px;">
      <button id="notes-sort-btn" class="btn-preset" style="font-size:11px; padding:4px 8px;">Newest first</button>
    </div>
    <!-- Notes list rendered by JS -->
    <div id="notes-list"></div>
  </div>
</div>
